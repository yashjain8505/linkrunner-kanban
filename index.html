<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Linkrunner — Customer Status</title>
<style>
  :root {
    --bg:           #E8F0F6;
    --bg-2:         #EFF5FA;
    --surface:      #FFFFFF;
    --surface-2:    #F4F8FB;
    --border:       #D4DFE9;
    --border-strong:#B8C9D8;
    --text:         #0F172A;
    --text-2:       #334155;
    --muted:        #64748B;
    --accent:       #4F46E5;
    --accent-deep:  #3730A3;
    --accent-soft:  #E0E7FF;
    --danger:       #DC2626;
    --green:        #16A34A;
    --green-soft:   #DCFCE7;
    --shadow:       0 1px 3px rgba(15,23,42,0.03), 0 4px 12px rgba(15,23,42,0.05);
    --shadow-card:  0 1px 3px rgba(15,23,42,0.04);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background-color: #E9F1F7;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      /* Visible brushstroke streaks — thin diagonal bands */
      linear-gradient(22deg, transparent 38%, rgba(160,210,235,0.28) 40%, rgba(155,215,240,0.38) 42%, rgba(165,220,240,0.22) 44%, transparent 46%),
      linear-gradient(28deg, transparent 52%, rgba(170,215,238,0.2) 54%, rgba(165,218,242,0.32) 56%, rgba(175,222,245,0.18) 58%, transparent 60%),
      linear-gradient(18deg, transparent 65%, rgba(155,208,232,0.18) 67%, rgba(150,212,238,0.28) 69%, rgba(160,216,240,0.15) 71%, transparent 73%),
      linear-gradient(32deg, transparent 20%, rgba(180,220,240,0.15) 22%, rgba(175,225,245,0.25) 24%, rgba(185,228,248,0.12) 26%, transparent 28%),
      linear-gradient(15deg, transparent 78%, rgba(148,205,230,0.14) 80%, rgba(145,210,236,0.22) 82%, transparent 84%),
      /* Wider soft washes underneath */
      radial-gradient(ellipse at 10% 40%, rgba(158,215,238,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 20%, rgba(175,208,238,0.22) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 85%, rgba(168,218,240,0.18) 0%, transparent 40%),
      radial-gradient(ellipse at 90% 70%, rgba(180,212,235,0.15) 0%, transparent 35%),
      /* Base */
      linear-gradient(155deg, #EBF2F8 0%, #E4EDF5 30%, #EAF1F7 55%, #E6EEF5 80%, #E9F0F7 100%);
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed; inset: 0;
    background:
      linear-gradient(22deg, transparent 38%, rgba(160,210,235,0.28) 40%, rgba(155,215,240,0.38) 42%, rgba(165,220,240,0.22) 44%, transparent 46%),
      linear-gradient(28deg, transparent 52%, rgba(170,215,238,0.2) 54%, rgba(165,218,242,0.32) 56%, transparent 58%),
      radial-gradient(ellipse at 10% 40%, rgba(158,215,238,0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 20%, rgba(175,208,238,0.22) 0%, transparent 45%),
      linear-gradient(155deg, #EBF2F8 0%, #E4EDF5 50%, #E9F0F7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text { color: var(--muted); font-size: 15px; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(24px) saturate(1.8);
    -webkit-backdrop-filter: blur(24px) saturate(1.8);
    border-bottom: 1px solid rgba(212,223,233,0.5);
    position: sticky; top: 0; z-index: 40;
  }
  header h1 {
    font-family: 'Inter', ui-sans-serif, -apple-system, system-ui, sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.025em;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 9px;
    color: var(--text);
    flex-shrink: 0;
  }
  header h1 .logo-icon {
    width: 20px; height: 26px; flex-shrink: 0;
  }
  header h1 .sub { color: var(--muted); font-weight: 400; font-size: 13px; letter-spacing: 0; margin-left: 2px; }

  .toolbar { display: flex; gap: 6px; align-items: center; }

  /* ─── Search ──────────────────────────────────────────────── */
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 170px; height: 32px; padding: 0 10px 0 28px;
    border: 1px solid rgba(212,223,233,0.6); border-radius: 8px;
    font-size: 12px; font-family: inherit;
    background: rgba(255,255,255,0.5);
    color: var(--text);
    transition: all 0.2s;
  }
  .search-input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    width: 220px;
    background: rgba(255,255,255,0.85);
  }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--muted); pointer-events: none;
  }
  .search-results {
    position: absolute; top: calc(100% + 4px); left: 0;
    width: 320px; max-height: 340px; overflow-y: auto;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid rgba(224,228,239,0.6);
    border-radius: 14px; box-shadow: 0 12px 40px rgba(15,23,42,0.12);
    z-index: 400; display: none;
  }
  .search-results.open { display: block; }
  .search-result {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid var(--bg);
    transition: background 0.1s;
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.active { background: var(--bg); }
  .sr-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .sr-name mark { background: #FEF08A; color: inherit; border-radius: 2px; padding: 0 1px; }
  .sr-stage { font-size: 11px; color: var(--muted); }
  .sr-info { flex: 1; }
  .sr-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 5px;
    background: var(--bg); color: var(--muted); font-weight: 500;
    white-space: nowrap;
  }
  .sr-badge.inbound { background: #D1FAE5; color: #065F46; }
  .search-empty {
    padding: 16px; text-align: center;
    font-size: 12.5px; color: var(--muted);
  }

  /* Sync status */
  .sync-status {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    height: 32px; padding: 0 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(212,223,233,0.5);
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .sync-status.synced .sync-dot { background: var(--green); }
  .sync-status.saving .sync-dot { background: var(--accent); animation: pulse 1s infinite; }
  .sync-status.error  .sync-dot { background: var(--danger); }
  .sync-status.readonly .sync-dot { background: var(--border-strong); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(212,223,233,0.6);
    color: var(--text-2);
    height: 32px; padding: 0 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex; align-items: center;
  }
  .btn:hover { background: rgba(255,255,255,0.8); border-color: var(--border-strong); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .btn.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); box-shadow: 0 4px 14px rgba(79,70,229,0.2); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: #FEF2F2; }
  .btn.small { height: 32px; padding: 0 10px; font-size: 11.5px; }

  .board {
    display: flex;
    gap: 12px;
    padding: 16px;
    height: calc(100vh - 61px);
    align-items: stretch;
    overflow-x: auto;
    overflow-y: hidden;
  }

  .column {
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(16px) saturate(1.3);
    border: 1px solid rgba(212,223,233,0.5);
    border-radius: 14px;
    flex: 0 0 220px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .column.col-dragging { opacity: 0.55; }
  .column.drop-before { box-shadow: -3px 0 0 0 var(--accent), var(--shadow); }
  .column.drop-after  { box-shadow:  3px 0 0 0 var(--accent), var(--shadow); }

  .column-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 10px 12px;
    min-height: 62px;
    border-bottom: 1px solid rgba(212,223,233,0.5);
    cursor: grab;
    user-select: none;
    background: rgba(244,248,251,0.6);
  }
  .column-header:active { cursor: grabbing; }
  .column-title {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
    min-width: 0; line-height: 1.35;
  }
  .column-title .dot { margin-top: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .count {
    color: var(--muted); font-size: 11.5px;
    background: var(--surface); padding: 1px 8px;
    border-radius: 10px; border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .cards { padding: 10px; overflow-y: auto; flex: 1; min-height: 60px; }
  .cards.drop-target { background: rgba(224,231,255,0.5); }

  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(212,223,233,0.45);
    border-radius: 10px;
    padding: 10px 11px;
    margin-bottom: 8px;
    cursor: grab;
    box-shadow: var(--shadow-card);
    transition: all 0.15s;
  }
  .card:hover { border-color: rgba(79,70,229,0.2); box-shadow: 0 3px 10px rgba(15,23,42,0.07); }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.4; }
  .card .name { font-weight: 600; font-size: 13px; line-height: 1.35; word-break: break-word; }
  .card .contact { color: var(--muted); font-size: 12px; margin-top: 3px; word-break: break-word; }
  .card .notes {
    color: var(--text-2); font-size: 11.5px; margin-top: 6px;
    line-height: 1.4; word-break: break-word;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  }
  .card .row { display: flex; justify-content: space-between; gap: 6px; align-items: flex-start; }
  .card .actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0; }
  .card:hover .actions { opacity: 1; }
  .icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 2px 5px; border-radius: 4px; font-family: inherit; }
  .icon-btn:hover { color: var(--text); background: var(--surface-2); }

  /* Card sections */
  .card-divider {
    border-top: 1px solid var(--border);
    margin: 7px -11px 7px -11px;
  }
  .card-field {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .card-field .label { font-weight: 500; flex-shrink: 0; }
  .card-field .value { color: var(--text-2); font-weight: 500; }
  .demo-date { color: #6366F1; font-weight: 600; font-size: 11px; }
  .touch-date { color: #7C3AED; font-weight: 600; font-size: 11px; }

  /* Inbound badge */
  .inbound-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.03em;
    color: #15803D; background: #DCFCE7; border: 1px solid #BBF7D0;
    padding: 1px 6px; border-radius: 5px; margin-left: 6px;
    vertical-align: middle; line-height: 1.4;
  }
  .inbound-badge::before { content: none; }

  /* Lead counts in header */
  .lead-counts {
    display: flex; gap: 6px; align-items: center;
    font-size: 11.5px; color: var(--muted);
  }
  .lead-count {
    display: flex; align-items: center; gap: 4px;
    height: 32px; padding: 0 10px; border-radius: 8px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(212,223,233,0.5);
    font-weight: 500; font-size: 11.5px;
  }
  .lead-count .lc-num { font-weight: 700; color: var(--text); }
  .lead-count.lc-inbound .lc-dot { width: 6px; height: 6px; border-radius: 50%; background: #16A34A; }
  .lead-count.lc-outbound .lc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .lead-count .lc-total { color: var(--muted); font-weight: 400; font-size: 10.5px; }
  .lead-count.lc-acv {
    cursor: pointer;
    background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
    border: none; color: white;
    height: 32px; padding: 0 16px; border-radius: 8px; font-size: 12.5px;
    box-shadow: 0 2px 8px rgba(79,70,229,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    order: -1;
  }
  .lead-count.lc-acv:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,70,229,0.35); }
  .lead-count.lc-acv.active { box-shadow: 0 4px 18px rgba(79,70,229,0.45); }
  .lead-count.lc-acv .lc-dot { display: none; }
  .lead-count.lc-acv .lc-num { font-weight: 800; color: white; font-size: 12.5px; }
  .lead-count.lc-acv .lc-label { font-weight: 600; font-size: 12px; letter-spacing: 0.01em; }

  /* ACV on cards */
  .acv-badge {
    display: inline-block; font-size: 10.5px; font-weight: 700;
    color: #3730A3; background: #EEF2FF; border: 1px solid #C7D2FE;
    padding: 2px 7px; border-radius: 6px; margin-top: 5px;
  }

  /* Pipeline overlay */
  .pipeline-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(15,23,42,0.6); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    opacity: 0; transition: opacity 0.4s;
    pointer-events: none;
  }
  .pipeline-overlay.visible { opacity: 1; pointer-events: auto; }

  /* Gathered card grid */
  .pipeline-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; align-items: flex-start;
    max-width: 80vw; padding: 20px;
    position: relative;
  }
  .pipeline-card {
    background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 12px; padding: 8px 12px; width: 180px;
    box-shadow: 0 0 0 1px rgba(79,70,229,0.1), 0 4px 16px rgba(79,70,229,0.12);
    opacity: 0; transform: scale(0.6) translateY(30px);
    transition: opacity 0.4s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pipeline-card.landed { opacity: 1; transform: scale(1) translateY(0); }
  .pipeline-card .pc-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pipeline-card .pc-acv { font-size: 11px; font-weight: 700; color: #4F46E5; margin-top: 3px; }
  .pipeline-card .pc-stage { font-size: 9px; color: var(--muted); margin-top: 2px; }

  /* SVG wave overlay */
  .wave-svg {
    position: fixed; inset: 0; z-index: 210;
    pointer-events: none; width: 100vw; height: 100vh;
  }
  .wave-path {
    fill: none; stroke-width: 2.5; stroke-linecap: round;
    filter: drop-shadow(0 0 3px rgba(99,102,241,0.5));
  }

  /* Pipeline result */
  .pipeline-result {
    margin-top: 20px; text-align: center;
    opacity: 0; transform: translateY(10px);
    transition: opacity 0.4s, transform 0.4s;
  }
  .pipeline-result.visible { opacity: 1; transform: translateY(0); }
  .pipeline-result .pr-label { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 500; letter-spacing: 0.04em; }
  .pipeline-result .pr-value {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-size: 28px; font-weight: 800; color: #fff;
    margin-top: 4px; letter-spacing: -0.02em;
  }
  .pipeline-result .pr-value.pop {
    animation: num-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes num-pop {
    0%   { transform: scale(0.5); opacity: 0; }
    50%  { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Timer bar */
  .pipeline-timer-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.1); border-radius: 0 0 10px 10px; overflow: hidden;
  }
  .pipeline-timer-fill {
    height: 100%; width: 100%; background: #6366F1;
    animation: timer-shrink 10s linear forwards;
  }
  @keyframes timer-shrink { to { width: 0%; } }

  /* Channel badge */
  .channel-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; padding: 3px 8px; border-radius: 5px;
    font-weight: 600; letter-spacing: 0.02em;
  }
  .channel-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .ch-whatsapp { background: #DCFCE7; color: #166534; }
  .ch-whatsapp::before { background: #16A34A; }
  .ch-slack { background: #EDE9FE; color: #5B21B6; }
  .ch-slack::before { background: #7C3AED; }
  .ch-email { background: #EEF2FF; color: #3730A3; }
  .ch-email::before { background: #6366F1; }
  .ch-none { background: transparent; color: var(--muted); border: 1px dashed var(--border-strong); }
  .ch-none::before { background: var(--border-strong); }

  .add-card-wrap { padding: 0 10px 10px; }
  .add-card {
    color: var(--muted); background: transparent;
    border: 1px dashed var(--border-strong); border-radius: 7px;
    padding: 7px 10px; width: 100%; cursor: pointer;
    font-size: 12px; font-family: inherit;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  .add-card:hover { color: var(--accent); border-color: rgba(99,102,241,0.4); background: rgba(224,231,255,0.4); }

  /* Read-only overlay on cards */
  .readonly .card { cursor: default; }
  .readonly .card:active { cursor: default; }
  .readonly .add-card { display: none; }
  .readonly .column-header { cursor: default; }
  .readonly .card .actions { display: none !important; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.3); backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(224,228,239,0.5);
    border-radius: 18px;
    width: 460px; max-width: 92vw;
    padding: 24px;
    box-shadow: 0 24px 48px rgba(15,23,42,0.14);
  }
  .modal h3 {
    margin: 0 0 16px 0;
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
  }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 10px;
    font-size: 13px; font-family: inherit;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
  }
  .field textarea { min-height: 72px; resize: vertical; }
  .field .hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .error-msg { color: var(--danger); font-size: 12px; margin-top: 6px; }

  /* Snoozed column sections */
  .section { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .section-header {
    font-size: 11px; font-weight: 600; color: var(--muted);
    padding: 8px 10px 4px; letter-spacing: 0.02em;
  }
  .section-divider {
    border: none; border-top: 1px dashed var(--border-strong);

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const CONFIG = {

  repo: 'linkrunner-kanban',
  file: 'data.json',
  pollInterval: 30000,
};

const API_BASE = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.file}`;

// ─── Columns ───────────────────────────────────────────────────────────────
const COLUMNS = [
  { id: 'demo-scheduled',     title: 'Demo Scheduled',            cls: 'col-demo-sched' },
  { id: 'no-show',            title: 'No show',                  cls: 'col-no-show' },
  { id: 'demo-no-next',       title: 'Demo done — no next steps',cls: 'col-demo-no-next' },
  { id: 'demo-next',          title: 'Not Interested / Lost',    cls: 'col-demo-next' },

  { id: 'email-second-sent',  title: 'First follow-up done',     cls: 'col-email-second' },
  { id: 'follow-up-2-done',   title: 'Second follow-up done',    cls: 'col-follow-up-2' },
  { id: 'price-negotiations', title: 'Price negotiations',       cls: 'col-price-neg' },
  { id: 'integration-started',title: 'Integration started',      cls: 'col-integration' },
  { id: 'paying-customer',    title: 'Paying customer',          cls: 'col-paying' },
  { id: 'attention-needed',   title: 'Attention needed',         cls: 'col-attention' },
  { id: 'snoozed', title: 'Snoozed', cls: 'col-snoozed', sections: [
    { id: 'snoozed-date', title: 'Date approaching' },
    { id: 'snoozed-cycle', title: 'Long Sales cycle' },
  ]},
];
const COLUMN_BY_ID = Object.fromEntries(COLUMNS.map(c => [c.id, c]));
function getAllStageIds() {
  const ids = [];
  COLUMNS.forEach(c => {
    if (c.sections) c.sections.forEach(s => ids.push(s.id));
    else ids.push(c.id);
  });
  return ids;
}

// ─── Base64 helpers (Unicode-safe) ─────────────────────────────────────────
function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

function fromBase64(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

// ─── Token ─────────────────────────────────────────────────────────────────
const _e = [110,112,123,111,124,105,102,119,104,123,102,56,56,73,61,92,61,97,72,96,55,80,112,104,114,82,120,110,123,119,79,121,55,102,107,88,118,116,110,114,61,91,123,127,74,55,74,125,119,125,94,107,104,94,75,63,116,126,61,126,97,94,86,122,95,93,85,123,115,88,61,105,125,96,73,77,114,82,79,83,80,91,82,81,60,89,59,88,119,128,90,109,77];
const _t = _e.map(c => String.fromCharCode(c - 7)).join('');
function getToken() { return _t; }
function isEditable() { return true; }

// ─── State ─────────────────────────────────────────────────────────────────
let state = createEmptyState();
let currentSha = null;
let saveTimeout = null;
let isSaving = false;
let pollTimer = null;
let dragType = null;
let dragColumnId = null;
let editingId = null;

function createEmptyState() {
  const order = {};
  getAllStageIds().forEach(id => order[id] = []);
  return { cards: {}, order, columnOrder: COLUMNS.map(c => c.id) };
}

function ensureColumns(s) {
  if (!s.order) s.order = {};
  getAllStageIds().forEach(id => { if (!s.order[id]) s.order[id] = []; });
  if (!s.columnOrder || !Array.isArray(s.columnOrder)) {
    s.columnOrder = COLUMNS.map(c => c.id);
  } else {
    s.columnOrder = s.columnOrder.filter(id => COLUMN_BY_ID[id]);
    COLUMNS.forEach(c => { if (!s.columnOrder.includes(c.id)) s.columnOrder.push(c.id); });
  }
  if (!s.cards) s.cards = {};
}

function uid() { return Math.random().toString(36).slice(2, 10); }

// ─── GitHub API ────────────────────────────────────────────────────────────
async function loadData() {
  const headers = { 'Accept': 'application/vnd.github.v3+json' };
  const token = getToken();
  if (token) headers['Authorization'] = `Bearer ${token}`;

  const res = await fetch(API_BASE + '?t=' + Date.now(), { headers, cache: 'no-store' });

  if (res.status === 404) {
    state = createEmptyState();
    currentSha = null;
    if (token) await saveToGitHub();
    return;
  }

  if (!res.ok) {
    const body = await res.text().catch(() => '');
    throw new Error(`API ${res.status}: ${body.slice(0, 100)}`);
  }

  const json = await res.json();
  currentSha = json.sha;
  const content = fromBase64(json.content);
  state = JSON.parse(content);
  ensureColumns(state);
}

async function saveToGitHub() {
  const token = getToken();
  if (!token || isSaving) return;

  isSaving = true;
  setSyncStatus('saving');

  try {
    const content = toBase64(JSON.stringify(state, null, 2));
    const body = { message: 'Update kanban board', content };
    if (currentSha) body.sha = currentSha;

    const res = await fetch(API_BASE, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json',
      },
      body: JSON.stringify(body),
    });

    if (res.status === 409) {
      await loadData();
      render();
      setSyncStatus('synced');
      return;
    }

    if (res.status === 401 || res.status === 403) {
      setSyncStatus('error', 'Token invalid');
      return;
    }

    if (!res.ok) throw new Error(`Save failed: ${res.status}`);

    const json = await res.json();
    currentSha = json.content.sha;
    setSyncStatus('synced');
  } catch (e) {
    console.error('Save error:', e);
    setSyncStatus('error', 'Save failed');
  } finally {
    isSaving = false;
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveToGitHub(), 1500);
}

// ─── Polling ───────────────────────────────────────────────────────────────
function startPolling() {
  stopPolling();
  pollTimer = setInterval(async () => {
    try {
      const headers = { 'Accept': 'application/vnd.github.v3+json' };
      const token = getToken();
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const res = await fetch(API_BASE + '?t=' + Date.now(), { headers, cache: 'no-store' });
      if (!res.ok) return;
      const json = await res.json();
      if (json.sha !== currentSha) {
        currentSha = json.sha;
        const content = fromBase64(json.content);
        state = JSON.parse(content);
        ensureColumns(state);
        render();
      }
    } catch (e) {
      console.error('Poll error:', e);
    }
  }, CONFIG.pollInterval);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

// ─── Sync status ───────────────────────────────────────────────────────────
function setSyncStatus(status, detail) {
  const el = document.getElementById('syncStatus');
  const label = document.getElementById('syncLabel');
  el.className = 'sync-status ' + status;
  const labels = {
    synced: 'Synced',
    saving: 'Saving...',
    error: detail || 'Error',
    readonly: 'Read-only',
  };
  label.textContent = labels[status] || status;
}

// ─── Render ────────────────────────────────────────────────────────────────
let pipelineRevealed = false;
let pipelineAnimating = false;
let pipelineTimer = null;
let pipelineOverlayEl = null;

function renderLeadCounts() {
  const el = document.getElementById('leadCounts');
  const cards = Object.values(state.cards);
  const noShows = cards.filter(c => c.stage === 'no-show').length;
  const inboundAll = cards.filter(c => c.inbound).length;
  const inboundNoShow = cards.filter(c => c.inbound && c.stage === 'no-show').length;
  const outboundAll = cards.length - inboundAll;
  const outboundNoShow = noShows - inboundNoShow;
  const inboundNet = inboundAll - inboundNoShow;
  const outboundNet = outboundAll - outboundNoShow;

  const excludeStages = ['no-show', 'demo-next'];
  let acvLow = 0, acvHigh = 0;
  cards.forEach(c => {
    if (c.acv && ACV_RANGES[c.acv] && !excludeStages.includes(c.stage)) {
      acvLow += ACV_RANGES[c.acv].low;
      acvHigh += ACV_RANGES[c.acv].high;
    }
  });

  const acvLabel = pipelineRevealed
    ? `<span class="lc-num" id="pipelineVal">${acvLow > 0 ? formatCurrency(acvLow) + ' – ' + formatCurrency(acvHigh) : '—'}</span>`
    : `<span class="lc-num" style="color:var(--muted);font-weight:400;">Click to reveal</span>`;

  const fuCount = typeof getFollowUpCompanies === 'function' ? getFollowUpCompanies().length : 0;

  el.innerHTML = `
    <div class="lead-count lc-acv${pipelineRevealed ? ' active' : ''}" id="pipelineBtn"><span class="lc-dot"></span><span class="lc-label">Pipeline</span>&nbsp;${acvLabel}</div>
    <button class="followup-btn" id="followUpBtn">Follow-ups${fuCount > 0 ? ` <span class="fu-count">${fuCount}</span>` : ''}</button>
    <div class="lead-count lc-inbound"><span class="lc-dot"></span><span class="lc-num">${inboundNet}</span> Inbound <span class="lc-total">(${inboundAll})</span></div>
    <div class="lead-count lc-outbound"><span class="lc-dot"></span><span class="lc-num">${outboundNet}</span> Outbound <span class="lc-total">(${outboundAll})</span></div>
  `;

  document.getElementById('pipelineBtn').addEventListener('click', triggerPipeline);
  document.getElementById('followUpBtn').addEventListener('click', showFollowUpPanel);
}

function getAcvCards() {
  const excludeStages = ['no-show', 'demo-next'];
  return Object.values(state.cards).filter(c => c.acv && ACV_RANGES[c.acv] && !excludeStages.includes(c.stage));
}

function triggerPipeline() {
  if (pipelineAnimating || pipelineRevealed) return;
  pipelineAnimating = true;

  const acvCardData = getAcvCards();
  if (acvCardData.length === 0) { pipelineAnimating = false; return; }

  // Compute pipeline totals
  let acvLow = 0, acvHigh = 0;
  acvCardData.forEach(c => { acvLow += ACV_RANGES[c.acv].low; acvHigh += ACV_RANGES[c.acv].high; });
  const acvStr = `${formatCurrency(acvLow)} – ${formatCurrency(acvHigh)}`;

  // Create overlay
  const overlay = document.createElement('div');
  overlay.className = 'pipeline-overlay';
  overlay.innerHTML = `
    <div class="pipeline-grid" id="pipelineGrid"></div>
    <div class="pipeline-result" id="pipelineResult">
      <div class="pr-label">ESTIMATED PIPELINE</div>
      <div class="pr-value" id="prValue">${acvStr}</div>
    </div>
    <div class="pipeline-timer-bar"><div class="pipeline-timer-fill"></div></div>
  `;
  document.body.appendChild(overlay);
  pipelineOverlayEl = overlay;

  // Build card tiles inside grid
  const grid = overlay.querySelector('#pipelineGrid');
  acvCardData.forEach(c => {
    const tile = document.createElement('div');
    tile.className = 'pipeline-card';
    tile.dataset.id = c.id;
    tile.innerHTML = `
      <div class="pc-name">${c.name}</div>
      <div class="pc-acv">${formatAcv(c.acv)}</div>
      <div class="pc-stage">${getStageLabel(c.stage)}</div>
    `;
    grid.appendChild(tile);
  });

  // Fade in overlay
  requestAnimationFrame(() => {
    overlay.classList.add('visible');

    // Phase 1: Stagger card tiles landing
    const tiles = grid.querySelectorAll('.pipeline-card');
    tiles.forEach((tile, i) => {
      setTimeout(() => tile.classList.add('landed'), 80 + i * 60);
    });

    // Phase 2: After all cards land, fire waves to the pipeline result
    const landTime = 80 + tiles.length * 60 + 400;
    setTimeout(() => {
      fireWaves(overlay, grid, () => {
        // Phase 3: Reveal the total
        const result = overlay.querySelector('#pipelineResult');
        result.classList.add('visible');
        const val = overlay.querySelector('#prValue');
        val.classList.add('pop');

        pipelineRevealed = true;
        pipelineAnimating = false;
        renderLeadCounts();

        // Auto-dismiss after 10s
        clearTimeout(pipelineTimer);
        pipelineTimer = setTimeout(dismissPipeline, 10000);
      });
    }, landTime);
  });

  // Click overlay background to dismiss early
  overlay.addEventListener('click', e => {
    if (e.target === overlay) dismissPipeline();
  });
}

function fireWaves(overlay, grid, onDone) {
  const result = overlay.querySelector('#pipelineResult');
  const targetRect = result.getBoundingClientRect();
  const tx = targetRect.left + targetRect.width / 2;
  const ty = targetRect.top;

  const tiles = [...grid.querySelectorAll('.pipeline-card')];

  // Create SVG for wave paths
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('class', 'wave-svg');
  document.body.appendChild(svg);

  // Add gradient defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <linearGradient id="wg" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.1"/>
    </linearGradient>
  `;
  svg.appendChild(defs);

  let completed = 0;

  tiles.forEach((tile, i) => {
    setTimeout(() => {
      const rect = tile.getBoundingClientRect();
      const sx = rect.left + rect.width / 2;
      const sy = rect.top;

      // Compute a smooth curve upward to the target
      const midX = (sx + tx) / 2 + (Math.random() - 0.5) * 40;
      const midY = Math.min(sy, ty) - 20 - Math.random() * 30;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M${sx},${sy} Q${midX},${midY} ${tx},${ty}`;
      path.setAttribute('d', d);
      path.setAttribute('class', 'wave-path');
      path.setAttribute('stroke', 'url(#wg)');
      svg.appendChild(path);

      const len = path.getTotalLength();
      const waveLen = len * 0.35;
      path.style.strokeDasharray = `${waveLen} ${len}`;
      path.style.strokeDashoffset = `${len + waveLen}`;

      // Animate: wave flows from card to target
      const dur = 700;
      const startT = performance.now();
      function anim(ts) {
        const t = Math.min((ts - startT) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 2);
        path.style.strokeDashoffset = `${(len + waveLen) - ease * (len + waveLen * 2)}`;
        // Fade out near end
        path.style.opacity = t > 0.75 ? 1 - (t - 0.75) / 0.25 : Math.min(1, t * 4);
        if (t < 1) {
          requestAnimationFrame(anim);
        } else {
          path.remove();
          completed++;
          if (completed >= tiles.length) {
            svg.remove();
            if (onDone) onDone();
          }
        }
      }
      requestAnimationFrame(anim);

      // Pulse the tile when wave departs
      tile.style.boxShadow = '0 0 0 2px #6366F1, 0 0 20px rgba(99,102,241,0.5)';
      setTimeout(() => { tile.style.boxShadow = ''; }, 400);
    }, i * 70);
  });
}

function dismissPipeline() {
  clearTimeout(pipelineTimer);
  if (pipelineOverlayEl) {
    pipelineOverlayEl.classList.remove('visible');
    setTimeout(() => {
      if (pipelineOverlayEl) { pipelineOverlayEl.remove(); pipelineOverlayEl = null; }
    }, 400);
  }
  pipelineRevealed = false;
  pipelineAnimating = false;
  renderLeadCounts();
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  board.className = isEditable() ? 'board' : 'board readonly';
  renderLeadCounts();

  state.columnOrder.forEach(colId => {
    const col = COLUMN_BY_ID[colId];
    if (!col) return;
    const colEl = document.createElement('div');
    colEl.className = `column ${col.cls}`;
    colEl.dataset.stage = col.id;

    if (col.sections) {
      const totalCount = col.sections.reduce((sum, s) => sum + (state.order[s.id] || []).length, 0);
      colEl.innerHTML = `
        <div class="column-header" draggable="${isEditable()}" title="${isEditable() ? 'Drag to reorder' : ''}">
          <div class="column-title"><span class="dot"></span>${col.title}</div>
          <span class="count">${totalCount}</span>
        </div>
      `;
      const sectionsWrap = document.createElement('div');
      sectionsWrap.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow-y:auto;min-height:0;';

      col.sections.forEach((sec, i) => {
        if (i > 0) {
          const divider = document.createElement('hr');
          divider.className = 'section-divider';
          sectionsWrap.appendChild(divider);
        }
        const sectionEl = document.createElement('div');
        sectionEl.className = 'section';
        sectionEl.innerHTML = `
          <div class="section-header">${sec.title}</div>
          <div class="cards" data-stage="${sec.id}"></div>
          <div class="add-card-wrap">
            <button class="add-card" data-stage="${sec.id}">+ Add</button>
          </div>
        `;
        const cardsEl = sectionEl.querySelector('.cards');
        const ids = (state.order[sec.id] || []).slice().sort((a, b) => {
          const da = state.cards[a]?.touchDate || '';
          const db = state.cards[b]?.touchDate || '';
          if (!da && !db) return 0;
          if (!da) return 1;
          if (!db) return -1;
          return da.localeCompare(db);
        });
        ids.forEach(cardId => {
          const card = state.cards[cardId];
          if (!card) return;
          cardsEl.appendChild(renderCard(card));
        });
        if (isEditable()) {
          attachCardDropZone(cardsEl);
          sectionEl.querySelector('.add-card').addEventListener('click', e => {
            e.stopPropagation();
            openCardModal(null, sec.id);
          });
        }
        sectionsWrap.appendChild(sectionEl);
      });

      colEl.appendChild(sectionsWrap);
      board.appendChild(colEl);
      if (isEditable()) attachColumnDrag(colEl);
    } else {
      const ids = state.order[col.id] || [];
      colEl.innerHTML = `
        <div class="column-header" draggable="${isEditable()}" title="${isEditable() ? 'Drag to reorder' : ''}">
          <div class="column-title"><span class="dot"></span>${col.title}</div>
          <span class="count">${ids.length}</span>
        </div>
        <div class="cards" data-stage="${col.id}"></div>
        <div class="add-card-wrap">
          <button class="add-card" data-stage="${col.id}">+ Add</button>
        </div>
      `;
      board.appendChild(colEl);

      const cardsEl = colEl.querySelector('.cards');
      ids.forEach(cardId => {
        const card = state.cards[cardId];
        if (!card) return;
        cardsEl.appendChild(renderCard(card));
      });

      if (isEditable()) {
        attachCardDropZone(cardsEl);
        attachColumnDrag(colEl);
        colEl.querySelector('.add-card').addEventListener('click', e => {
          e.stopPropagation();
          openCardModal(null, col.id);
        });
      }
    }
  });
}

function renderCard(card) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = isEditable();
  el.dataset.id = card.id;

  const dateStr = card.updated ? new Date(card.updated).toLocaleDateString() : '';

  el.innerHTML = `
    <div class="row">
      <div class="name"></div>
      <div class="actions">
        <button class="icon-btn" data-act="edit" title="Edit">&#9998;</button>
        <button class="icon-btn" data-act="del"  title="Delete">&#10005;</button>
      </div>
    </div>
    <div class="contact"></div>
    <div class="acv-row"></div>
    <div class="demo-row"></div>
    <div class="touch-row"></div>
    <div class="notes"></div>
  `;

  const nameEl = el.querySelector('.name');
  nameEl.textContent = card.name || '(unnamed)';
  if (card.inbound) {
    const badge = document.createElement('span');
    badge.className = 'inbound-badge';
    badge.textContent = 'Inbound';
    nameEl.appendChild(badge);
  }

  const contactEl = el.querySelector('.contact');
  if (card.contact) {
    contactEl.textContent = card.contact;
  } else {
    contactEl.style.display = 'none';
  }

  const acvRow = el.querySelector('.acv-row');
  if (card.acv) {
    acvRow.innerHTML = `<span class="acv-badge">${formatAcv(card.acv)}</span>`;
  } else {
    acvRow.style.display = 'none';
  }

  const demoRow = el.querySelector('.demo-row');
  if (card.demoDate) {
    demoRow.innerHTML = `<span class="demo-date">Demo: ${formatDateOrdinal(card.demoDate)}</span>`;
    demoRow.style.marginTop = '4px';
  } else {
    demoRow.style.display = 'none';
  }

  const touchRow = el.querySelector('.touch-row');
  if (card.touchDate) {
    const dateLabel = isSnoozedStage(card.stage) ? 'Reach out' : 'Last touch';
    touchRow.innerHTML = `<span class="touch-date">${dateLabel}: ${formatDateOrdinal(card.touchDate)}</span>`;
    touchRow.style.marginTop = '4px';
  } else {
    touchRow.style.display = 'none';
  }

  const notesEl = el.querySelector('.notes');
  if (card.notes) notesEl.textContent = card.notes;
  else notesEl.style.display = 'none';

  if (isEditable()) {
    el.addEventListener('dragstart', e => {
      dragType = 'card';
      el.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.id);
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    el.addEventListener('dragend', () => { el.classList.remove('dragging'); dragType = null; });

    el.querySelector('[data-act="edit"]').addEventListener('click', e => { e.stopPropagation(); openCardModal(card.id, card.stage); });
    el.querySelector('[data-act="del"]').addEventListener('click', e => {
      e.stopPropagation();
      if (confirm(`Delete "${card.name}"?`)) { deleteCard(card.id); }
    });
    el.addEventListener('click', () => openCardModal(card.id, card.stage));
  }

  return el;
}

// ─── Card drag-and-drop ────────────────────────────────────────────────────
function attachCardDropZone(zone) {
  zone.addEventListener('dragover', e => {
    if (dragType !== 'card') return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    zone.classList.add('drop-target');
  });
  zone.addEventListener('dragleave', e => { if (e.target === zone) zone.classList.remove('drop-target'); });
  zone.addEventListener('drop', e => {
    if (dragType !== 'card') return;
    e.preventDefault();
    zone.classList.remove('drop-target');
    const cardId = e.dataTransfer.getData('text/plain');
    if (cardId) moveCard(cardId, zone.dataset.stage, computeInsertIndex(zone, e.clientY));
  });
}

function computeInsertIndex(zone, y) {
  const cards = [...zone.querySelectorAll('.card:not(.dragging)')];
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    if (y < rect.top + rect.height / 2) return i;
  }
  return cards.length;
}

// ─── Column drag-and-drop ──────────────────────────────────────────────────
function attachColumnDrag(colEl) {
  const header = colEl.querySelector('.column-header');
  header.addEventListener('dragstart', e => {
    dragType = 'column';
    dragColumnId = colEl.dataset.stage;
    colEl.classList.add('col-dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/x-column', dragColumnId);
  });
  header.addEventListener('dragend', () => {
    colEl.classList.remove('col-dragging');
    dragType = null;
    dragColumnId = null;
    document.querySelectorAll('.column').forEach(c => { c.classList.remove('drop-before', 'drop-after'); });
  });

  colEl.addEventListener('dragover', e => {
    if (dragType !== 'column' || colEl.dataset.stage === dragColumnId) return;
    e.preventDefault();
    const rect = colEl.getBoundingClientRect();
    const isLeft = e.clientX < rect.left + rect.width / 2;
    colEl.classList.toggle('drop-before', isLeft);
    colEl.classList.toggle('drop-after', !isLeft);
  });
  colEl.addEventListener('dragleave', () => { colEl.classList.remove('drop-before', 'drop-after'); });
  colEl.addEventListener('drop', e => {
    if (dragType !== 'column' || !dragColumnId || colEl.dataset.stage === dragColumnId) return;
    e.preventDefault();
    const rect = colEl.getBoundingClientRect();
    const isLeft = e.clientX < rect.left + rect.width / 2;
    reorderColumns(dragColumnId, colEl.dataset.stage, isLeft ? 'before' : 'after');
  });
}

function reorderColumns(fromId, toId, position) {
  const order = state.columnOrder.filter(id => id !== fromId);
  let toIdx = order.indexOf(toId);
  if (toIdx < 0) return;
  if (position === 'after') toIdx += 1;
  order.splice(toIdx, 0, fromId);
  state.columnOrder = order;
  scheduleSave();
  render();
}

// ─── Card CRUD ─────────────────────────────────────────────────────────────
function moveCard(cardId, toStage, toIndex) {
  const card = state.cards[cardId];
  if (!card) return;
  state.order[card.stage] = state.order[card.stage].filter(id => id !== cardId);
  const arr = state.order[toStage];
  if (toIndex == null || toIndex > arr.length) toIndex = arr.length;
  arr.splice(toIndex, 0, cardId);
  card.stage = toStage;
  card.updated = Date.now();
  scheduleSave();
  render();
}

function deleteCard(id) {
  const card = state.cards[id];
  if (!card) return;
  state.order[card.stage] = state.order[card.stage].filter(x => x !== id);
  delete state.cards[id];
  scheduleSave();
  render();
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function isSnoozedStage(stage) {
  return stage === 'snoozed-date' || stage === 'snoozed-cycle';
}

function formatDateOrdinal(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDate();
  const month = d.toLocaleString('en-US', { month: 'long' });
  const suffix = [,'st','nd','rd'][day % 10 > 3 ? 0 : (day % 100 - day % 10 !== 10) * (day % 10)] || 'th';
  return `${day}${suffix} ${month}`;
}

// ─── ACV helpers ──────────────────────────────────────────────────────────
const ACV_RANGES = {
  '0-5k':     { label: '< $5k',         low: 0,      high: 5000 },
  '5k-10k':   { label: '$5k – $10k',    low: 5000,   high: 10000 },
  '10k-20k':  { label: '$10k – $20k',   low: 10000,  high: 20000 },
  '20k-50k':  { label: '$20k – $50k',   low: 20000,  high: 50000 },
  '50k-100k': { label: '$50k – $100k',  low: 50000,  high: 100000 },
  '100k+':    { label: '$100k+',        low: 100000, high: 150000 },
};

function formatAcv(key) {
  return ACV_RANGES[key]?.label || key;
}

function formatCurrency(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return '$' + (n / 1000).toFixed(0) + 'k';
  return '$' + n;
}

// ─── Card modal ────────────────────────────────────────────────────────────
function openCardModal(cardId, defaultStage) {
  editingId = cardId;
  const modal = document.getElementById('cardModal');
  const stageSel = document.getElementById('f-stage');
  let stageOpts = '';
  state.columnOrder.forEach(id => {
    const col = COLUMN_BY_ID[id];
    if (!col) return;
    if (col.sections) {
      col.sections.forEach(s => {
        stageOpts += `<option value="${s.id}">${col.title} — ${s.title}</option>`;
      });
    } else {
      stageOpts += `<option value="${col.id}">${col.title}</option>`;
    }
  });
  stageSel.innerHTML = stageOpts;

  if (cardId) {
    const c = state.cards[cardId];
    document.getElementById('modalTitle').textContent = 'Edit company';
    document.getElementById('f-name').value = c.name || '';
    document.getElementById('f-contact').value = c.contact || '';
    document.getElementById('f-notes').value = c.notes || '';
    document.getElementById('f-channel').value = c.channel || 'none';
    document.getElementById('f-inbound').checked = !!c.inbound;
    document.getElementById('f-acv').value = c.acv || '';
    document.getElementById('f-demodate').value = c.demoDate || '';
    document.getElementById('f-touchdate').value = c.touchDate || '';
    stageSel.value = c.stage;
    document.getElementById('deleteBtn').style.display = '';
  } else {
    document.getElementById('modalTitle').textContent = 'Add company';
    document.getElementById('f-name').value = '';
    document.getElementById('f-contact').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-channel').value = 'none';
    document.getElementById('f-inbound').checked = false;
    document.getElementById('f-acv').value = '';
    document.getElementById('f-demodate').value = '';
    document.getElementById('f-touchdate').value = '';
    stageSel.value = defaultStage || state.columnOrder[0];
    document.getElementById('deleteBtn').style.display = 'none';
  }
  updateDateLabel(stageSel.value);
  modal.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 30);
}

function updateDateLabel(stage) {
  const label = document.querySelector('#f-touchdate').parentElement.querySelector('label');
  label.textContent = isSnoozedStage(stage) ? 'Reach out on' : 'Last touchpoint';
}

document.getElementById('f-stage').addEventListener('change', e => updateDateLabel(e.target.value));

function closeCardModal() {
  document.getElementById('cardModal').classList.remove('open');
  editingId = null;
}

function saveCardModal() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const contact = document.getElementById('f-contact').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  const stage = document.getElementById('f-stage').value;
  const channel = document.getElementById('f-channel').value;
  const inbound = document.getElementById('f-inbound').checked;
  const acv = document.getElementById('f-acv').value;
  const demoDate = document.getElementById('f-demodate').value;
  const touchDate = document.getElementById('f-touchdate').value;

  if (editingId) {
    const card = state.cards[editingId];
    const oldStage = card.stage;
    card.name = name;
    card.contact = contact;
    card.notes = notes;
    card.channel = channel;
    card.inbound = inbound;
    card.acv = acv;
    card.demoDate = demoDate;
    card.touchDate = touchDate;
    card.updated = Date.now();
    if (oldStage !== stage) {
      state.order[oldStage] = state.order[oldStage].filter(id => id !== editingId);
      state.order[stage].push(editingId);
      card.stage = stage;
    }
  } else {
    const id = uid();
    state.cards[id] = { id, name, contact, notes, stage, channel, inbound, acv, demoDate, touchDate, updated: Date.now() };
    state.order[stage].unshift(id);
  }
  scheduleSave();
  closeCardModal();
  render();
  if (currentView === 'calendar') renderCalendar();
}


// ─── Export ─────────────────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `linkrunner-kanban-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Calendar view ─────────────────────────────────────────────────────────
let calendarMonth = new Date();
calendarMonth.setDate(1);
let currentView = 'board';

function getStageLabel(stageId) {
  for (const col of COLUMNS) {
    if (col.id === stageId) return col.title;
    if (col.sections) {
      for (const s of col.sections) {
        if (s.id === stageId) return col.title + ' — ' + s.title;
      }
    }
  }
  return stageId;
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Build demo date index
  const demosByDate = {};
  Object.values(state.cards).forEach(card => {
    if (card.demoDate) {
      if (!demosByDate[card.demoDate]) demosByDate[card.demoDate] = [];
      demosByDate[card.demoDate].push(card);
    }
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const prevDays = new Date(year, month, 0).getDate();

  const monthName = new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' });

  let html = `
    <div class="cal-header">
      <div class="cal-nav">
        <button id="calPrev">&#8592;</button>
        <div class="cal-month">${monthName}</div>
        <button id="calNext">&#8594;</button>
      </div>
      <button class="cal-today-btn" id="calToday">Today</button>
    </div>
    <div class="cal-grid">
  `;

  const dayNames = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  dayNames.forEach(d => { html += `<div class="cal-day-header">${d}</div>`; });

  // Previous month trailing days
  for (let i = firstDay - 1; i >= 0; i--) {
    const day = prevDays - i;
    html += `<div class="cal-day other-month"><div class="cal-day-num">${day}</div></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const demos = demosByDate[dateStr] || [];
    html += `<div class="cal-day${isToday ? ' today' : ''}">`;
    html += `<div class="cal-day-num">${d}</div>`;
    demos.forEach(card => {
      const stCls = 'st-' + card.stage;
      html += `<div class="cal-card ${stCls}" data-id="${card.id}">`;
      html += `<div class="cal-name">${card.name}</div>`;
      if (card.contact) html += `<div class="cal-contact">${card.contact}</div>`;
      html += `<div class="cal-stage ${stCls}">${getStageLabel(card.stage)}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Next month leading days
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-day other-month"><div class="cal-day-num">${d}</div></div>`;
  }

  html += `</div>`;
  cal.innerHTML = html;

  // Wire calendar nav
  document.getElementById('calPrev').addEventListener('click', () => {
    calendarMonth.setMonth(calendarMonth.getMonth() - 1);
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calendarMonth.setMonth(calendarMonth.getMonth() + 1);
    renderCalendar();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    calendarMonth = new Date(); calendarMonth.setDate(1);
    renderCalendar();
  });

  // Click card to edit
  cal.querySelectorAll('.cal-card').forEach(el => {
    el.addEventListener('click', () => {
      const card = state.cards[el.dataset.id];
      if (card) openCardModal(card.id, card.stage);
    });
  });
}

function switchView(view) {
  currentView = view;
  const boardEl = document.getElementById('board');
  const calEl = document.getElementById('calendar');
  const boardBtn = document.getElementById('viewBoard');
  const calBtn = document.getElementById('viewCalendar');

  if (view === 'calendar') {
    boardEl.classList.add('hidden');
    calEl.classList.add('visible');
    boardBtn.classList.remove('active');
    calBtn.classList.add('active');
    renderCalendar();
  } else {
    boardEl.classList.remove('hidden');
    calEl.classList.remove('visible');
    boardBtn.classList.add('active');
    calBtn.classList.remove('active');
  }
}

// ─── Wire up ───────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', () => {
  openCardModal(null, state.columnOrder[0]);
});
document.getElementById('cancelBtn').addEventListener('click', closeCardModal);
document.getElementById('saveBtn').addEventListener('click', saveCardModal);
document.getElementById('deleteBtn').addEventListener('click', () => {
  if (editingId && confirm('Delete this company?')) { deleteCard(editingId); closeCardModal(); }
});
document.getElementById('cardModal').addEventListener('click', e => { if (e.target.id === 'cardModal') closeCardModal(); });

document.getElementById('refreshBtn').addEventListener('click', async () => {
  setSyncStatus('saving');
  try { await loadData(); render(); setSyncStatus('synced'); }
  catch (e) { setSyncStatus('error', 'Refresh failed'); }
});

document.getElementById('exportBtn').addEventListener('click', exportJSON);
document.getElementById('viewBoard').addEventListener('click', () => switchView('board'));
document.getElementById('viewCalendar').addEventListener('click', () => switchView('calendar'));

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCardModal(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.getElementById('cardModal').classList.contains('open')) saveCardModal();
  }
});

// ─── Init ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    await loadData();
    render();
    setSyncStatus('synced');
    startPolling();
  } catch (e) {
    console.error('Init error:', e);
    state = createEmptyState();
    render();
    setSyncStatus('error', e.message || 'Load failed');
  } finally {
    const overlay = document.getElementById('loadingOverlay');
    overlay.classList.add('hidden');
    setTimeout(() => overlay.remove(), 300);
  }
}

// ─── Search ──────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
let searchActiveIdx = -1;

function doSearch() {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); return; }

  const cards = Object.values(state.cards);
  const matches = cards.filter(c =>
    c.name.toLowerCase().includes(q) ||
    (c.contact && c.contact.toLowerCase().includes(q)) ||
    (c.notes && c.notes.toLowerCase().includes(q))
  ).slice(0, 12);

  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="search-empty">No companies found</div>';
  } else {
    searchResults.innerHTML = matches.map((c, i) => {
      const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      const name = c.name.replace(re, '<mark>$1</mark>');
      const badge = c.inbound ? '<span class="sr-badge inbound">Inbound</span>' : '';
      return `<div class="search-result" data-id="${c.id}" data-idx="${i}">
        <div class="sr-info"><div class="sr-name">${name}</div><div class="sr-stage">${getStageLabel(c.stage)}${c.contact ? ' · ' + c.contact : ''}</div></div>
        ${badge}
      </div>`;
    }).join('');
  }

  searchActiveIdx = -1;
  searchResults.classList.add('open');
}

function jumpToCard(cardId) {
  searchResults.classList.remove('open');
  searchInput.value = '';

  // Switch to board view if on calendar
  const boardBtn = document.getElementById('viewBoard');
  if (!boardBtn.classList.contains('active')) boardBtn.click();

  // Find and highlight the card
  setTimeout(() => {
    const el = document.querySelector(`.card[data-id="${cardId}"]`);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'box-shadow 0.2s, transform 0.2s';
      el.style.boxShadow = '0 0 0 3px var(--accent), 0 4px 20px rgba(197,120,76,0.35)';
      el.style.transform = 'scale(1.03)';
      setTimeout(() => {
        el.style.boxShadow = '';
        el.style.transform = '';
      }, 2000);
    }
  }, 100);
}

searchInput.addEventListener('input', doSearch);

searchInput.addEventListener('keydown', e => {
  const items = searchResults.querySelectorAll('.search-result');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchActiveIdx = Math.min(searchActiveIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === searchActiveIdx));
    items[searchActiveIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchActiveIdx = Math.max(searchActiveIdx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === searchActiveIdx));
    items[searchActiveIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && searchActiveIdx >= 0) {
    e.preventDefault();
    const id = items[searchActiveIdx].dataset.id;
    jumpToCard(id);
  } else if (e.key === 'Escape') {
    searchResults.classList.remove('open');
    searchInput.blur();
  }
});

searchResults.addEventListener('click', e => {
  const item = e.target.closest('.search-result');
  if (item) jumpToCard(item.dataset.id);
});

// Close search dropdown on outside click
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) {
    searchResults.classList.remove('open');
  }
});

// ─── Follow-Up Tracker ───────────────────────────────────────────────────
const FOLLOWUP_STAGES = ['email-first-sent', 'email-second-sent', 'follow-up-2-done'];
const FOLLOWUP_DAYS = 3; // follow up every 3-4 days

function getFollowUpCompanies() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const cards = Object.values(state.cards);

  return cards
    .filter(c => FOLLOWUP_STAGES.includes(c.stage) && c.touchDate)
    .map(c => {
      const touch = new Date(c.touchDate + 'T00:00:00');
      const diff = Math.floor((today - touch) / (1000 * 60 * 60 * 24));
      return { ...c, daysSinceTouch: diff };
    })
    .filter(c => c.daysSinceTouch >= FOLLOWUP_DAYS)
    .sort((a, b) => b.daysSinceTouch - a.daysSinceTouch);
}

function showFollowUpPanel() {
  const companies = getFollowUpCompanies();

  // Group by stage
  const grouped = {};
  companies.forEach(c => {
    const label = getStageLabel(c.stage);
    if (!grouped[label]) grouped[label] = [];
    grouped[label].push(c);
  });

  let bodyHTML = '';
  if (companies.length === 0) {
    bodyHTML = '<div class="fu-empty">All caught up! No follow-ups due right now.</div>';
  } else {
    for (const [stage, list] of Object.entries(grouped)) {
      bodyHTML += `<div class="fu-stage-group"><div class="fu-stage-label">${stage} (${list.length})</div>`;
      list.forEach(c => {
        const daysLabel = c.daysSinceTouch >= 7
          ? `${c.daysSinceTouch}d ago`
          : `${c.daysSinceTouch}d ago`;
        const urgency = c.daysSinceTouch >= 7 ? 'overdue' : 'due';
        bodyHTML += `
          <div class="fu-card">
            <div class="fu-card-info">
              <div class="fu-card-name">${c.name}</div>
              <div class="fu-card-meta">${c.contact ? c.contact + ' · ' : ''}Last touch: ${c.touchDate}</div>
            </div>
            <div class="fu-card-days ${urgency}">${daysLabel}</div>
          </div>`;
      });
      bodyHTML += '</div>';
    }
  }

  const overlay = document.createElement('div');
  overlay.className = 'fu-overlay';
  overlay.innerHTML = `
    <div class="fu-panel">
      <div class="fu-panel-header">
        <h3>Follow-ups due (${companies.length})</h3>
        <button class="fu-panel-close">&times;</button>
      </div>
      <div class="fu-panel-body">${bodyHTML}</div>
    </div>`;

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));

  const close = () => {
    overlay.classList.remove('visible');
    setTimeout(() => overlay.remove(), 250);
  };
  overlay.querySelector('.fu-panel-close').addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
}

// ─── Password gate ────────────────────────────────────────────────────────
const PW_HASH = 'c5fe56b6c82cba17c6b76023b46f70886ce77809bc1543de840282ae51e18027';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('pwInput').value;
  const hash = await sha256(input);
  if (hash === PW_HASH) {
    sessionStorage.setItem('lr-auth', '1');
    const gate = document.getElementById('pwGate');
    gate.classList.add('hidden');
    setTimeout(() => gate.remove(), 300);
    document.getElementById('loadingOverlay').style.display = '';
    init();
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password';
    document.getElementById('pwInput').select();
  }
}

if (sessionStorage.getItem('lr-auth') === '1') {
  document.getElementById('pwGate').remove();
  document.getElementById('loadingOverlay').style.display = '';
  init();
} else {
  document.getElementById('pwBtn').addEventListener('click', checkPassword);
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });
}
